global:
  resolve_timeout: 5m

# 告警模板（Docker 环境使用 /etc/alertmanager/templates，裸机部署使用 /opt/monitoring/alertmanager/templates）
templates:
  - '/opt/monitoring/alertmanager/templates/*.tmpl'

# 路由配置
route:
  # 分组依据：告警名称、集群、服务、实例
  group_by: ['alertname', 'cluster', 'service', 'instance']
  group_wait: 10s
  group_interval: 5m  # 同一分组内新告警的发送间隔
  repeat_interval: 1h
  receiver: 'dingtalk-webhook'
  
  routes:
    # 紧急告警（立即通知）
    - match:
        severity: critical
      receiver: 'dingtalk-webhook'
      group_wait: 5s
      repeat_interval: 30m
    
    # 警告告警（延迟通知）
    - match:
        severity: warning
      receiver: 'dingtalk-webhook'
      group_wait: 30s
      repeat_interval: 2h

# 接收器配置
receivers:
  - name: 'dingtalk-webhook'
    webhook_configs:
      # 替换 YOUR_TOKEN 为实际的钉钉机器人 token
      - url: 'https://oapi.dingtalk.com/robot/send?access_token=YOUR_TOKEN'
        send_resolved: true
        http_config:
          follow_redirects: true
          enable_http2: true

# 抑制规则
inhibit_rules:
  # 当 critical 告警触发时，抑制同一实例的 warning 告警
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
